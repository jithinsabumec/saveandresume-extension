<!DOCTYPE html>
<html>

<head>
    <title>Save & Resume</title>
    <link rel="stylesheet" href="popup.css">
    <meta charset="UTF-8">
</head>

<body>
    <div class="container">
        <header class="main-header">
            <div class="header-left">
                <img src="logo(icon+wordmark).svg" width="82" alt="Save & Resume icon">
            </div>
            <div class="header-right">
                <div id="profile-btn-wrapper" class="profile-button-wrapper">
                    <button id="profile-button" class="profile-button" type="button" aria-haspopup="true"
                        aria-expanded="false" aria-label="Profile menu">
                        <img id="user-photo" alt="Profile photo" />
                    </button>
                    <div id="profile-dropdown" class="profile-dropdown" hidden>
                        <div id="profile-dropdown-signed-in" class="profile-dropdown-state" hidden>
                            <div id="profile-user-info" class="profile-user-info"></div>
                            <div class="profile-divider"></div>
                            <button id="study-mode-toggle-in" class="profile-menu-item profile-menu-item--with-pill"
                                type="button">
                                <span class="profile-menu-leading study-mode-leading">
                                    <img src="study-mode-icon.svg" width="14" height="14" alt="">
                                    <span>Study Mode</span>
                                    <span id="study-mode-info-btn-in" class="info-btn" role="button" tabindex="0"
                                        aria-label="What is Study Mode?" title="What is Study Mode?"><img src="Info.svg"
                                            width="14" height="14" alt="" aria-hidden="true"></span>
                                </span>
                                <span class="study-mode-controls">
                                    <span id="study-mode-pill-in" class="study-mode-pill" aria-hidden="true"></span>
                                </span>
                            </button>
                            <div class="profile-divider"></div>
                            <button id="sign-out-btn" class="profile-menu-item" type="button">
                                <img src="signout.svg" width="14" height="14" alt="">
                                <span>Log out</span>
                            </button>
                        </div>
                        <div id="profile-dropdown-signed-out" class="profile-dropdown-state">
                            <button id="study-mode-toggle-out" class="profile-menu-item profile-menu-item--with-pill"
                                type="button">
                                <span class="profile-menu-leading study-mode-leading">
                                    <img src="study-mode-icon.svg" width="14" height="14" alt="">
                                    <span>Study Mode</span>
                                    <span id="study-mode-info-btn-out" class="info-btn" role="button" tabindex="0"
                                        aria-label="What is Study Mode?" title="What is Study Mode?"><img src="Info.svg"
                                            width="14" height="14" alt="" aria-hidden="true"></span>
                                </span>
                                <span class="study-mode-controls">
                                    <span id="study-mode-pill-out" class="study-mode-pill" aria-hidden="true"></span>
                                </span>
                            </button>
                            <div class="profile-divider"></div>
                            <button id="sign-in-btn" class="profile-menu-item" type="button">
                                <span class="profile-menu-leading">
                                    <img src="google.svg" width="14" height="14" alt="Google">
                                    <span>Sign In with Google</span>
                                </span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <main>
                <div class="categories-container">
                    <div id="data-loading-state" class="data-loading-state" role="status" aria-live="polite"
                        aria-hidden="true">
                        <div class="loading-spinner" aria-hidden="true"></div>
                        <div class="data-loading-text">Loading timestamps...</div>
                    </div>
                    <div class="categories-header">
                        <div class="categories-title">Categories</div>
                        <div class="categories-actions">
                            <button id="editCategoriesBtn" class="edit-category-button" title="Edit categories">
                                <img src="edit.svg" width="14" height="14" alt="Edit">
                            </button>
                            <button id="addCategoryBtn" class="add-category-button" title="Add category">
                                <img src="add.svg" width="14" height="14" alt="Add">
                            </button>
                            <button id="saveCategoriesBtn" class="save-categories-button" title="Save changes"
                                style="display: none;">
                                Save
                            </button>
                        </div>
                    </div>
                    <div id="deleteModeHint" class="delete-mode-hint" aria-live="polite">
                        Delete mode: Tap a category or X, then confirm. Default stays.
                    </div>
                    <ul id="categoryList" class="category-list">
                        <!-- Categories will be populated here -->
                    </ul>
                    <div id="watchlist-container">
                        <ul id="watchlist"></ul>
                    </div>
                </div>
            </main>

            <footer>
                <div class="footer-container">
                    <div class="footer-text">
                        <div>Love to test out our mobile app?</div>
                        <a href="https://app.youform.com/forms/izw2jg5v" class="get-in-touch" target="_blank"
                            rel="noopener noreferrer">Let me know!</a>
                    </div>
                    <div>•</div>
                    <div>v1.3.0</div>
                </div>
            </footer>
        </div>
    </div>

    <!-- Modal for adding or editing categories -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Category</h3>
                <span id="closeCategoryModalBtn" class="close-modal" title="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        viewBox="0 0 256 256">
                        <path
                            d="M208.49,191.51a12,12,0,0,1-17,17L128,145,64.49,208.49a12,12,0,0,1-17-17L111,128,47.51,64.49a12,12,0,0,1,17-17L128,111l63.51-63.52a12,12,0,0,1,17,17L145,128Z">
                        </path>
                    </svg>
                </span>
            </div>
            <input type="text" id="categoryNameInput" placeholder="Category name">
            <div class="modal-buttons">
                <button id="saveCategoryBtn">Save</button>
                <button id="cancelCategoryBtn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="deleteCategoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Delete Category</h3>
                <span id="closeDeleteCategoryModalBtn" class="close-modal" title="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                        viewBox="0 0 256 256">
                        <path
                            d="M208.49,191.51a12,12,0,0,1-17,17L128,145,64.49,208.49a12,12,0,0,1-17-17L111,128,47.51,64.49a12,12,0,0,1,17-17L128,111l63.51-63.52a12,12,0,0,1,17,17L145,128Z">
                        </path>
                    </svg>
                </span>
            </div>
            <p id="deleteCategoryMessage" class="modal-message"></p>
            <div class="modal-buttons">
                <button id="cancelDeleteCategoryBtn">Cancel</button>
                <button id="confirmDeleteCategoryBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="auth_bundle.js"></script>
    <script src="data-layer.js"></script>
    <script src="popup.js"></script>
</body>

</html>
